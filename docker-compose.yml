# ── EduStat-TN — Docker Compose ──────────────
# Usage :  docker compose up --build
# ─────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: edustat_db
      POSTGRES_USER: edustat_user
      POSTGRES_PASSWORD: edustat_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edustat_user -d edustat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django Backend ──────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn edustat.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"

  # ── Next.js Frontend ───────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
